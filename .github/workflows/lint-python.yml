name: lint_python
on:
  pull_request:
    branches: [master, Issue_805_negative_inflight_messages]
  push:
    branches: [master, Issue_805_negative_inflight_messages]
jobs:
  lint_python:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - run: pip install tox
      - run: tox -e lint
